version: v1.0
workflows:
  index_align_bulk_rna_seq-workflow:
    type: cwl
    config:
      file: index_align_bulk_rna_seq.cwl
      settings: index_align_bulk_rna_seq-params.yml
    bindings:
      - step: /
        target:
          deployment: docker-index_align_bulk_rna_seq
deployments:
  docker-index_align_bulk_rna_seq:
    type: docker
    config:
      image: repbioinfo/rnaseqstar_v2
      volume:
        # percorso cartella di lavoro   =====================>
        - /c/percorso/cartella/di/lavoro:/workDir 
        # percorso cartella di lavoro, Genome   =====================>
        - /c/percorso/cartella/di/lavoro,/Genome:/genome 
        # percorso cartella Data, qui viene salvato il log e andrebbero piazzati i file di output. Scratch   =====================>
        - /c/percorso/cartella/Data,/qui/viene/salvato/il/log/e/andrebbero/piazzati/i/file/di/output./Scratch:/scratch 