version: v1.0
workflows:
  index_align_bulk_rna_seq-workflow:
    type: cwl
    config:
      file: index_align_bulk_rna_seq.cwl
      settings: index_align_bulk_rna_seq-params.yml
    bindings:
      - step: /
        target:
          deployment: docker-index_align_bulk_rna_seq
deployments:
  docker-index_align_bulk_rna_seq:
    type: docker
    config:
      image: repbioinfo/rnaseqstar_v2
      volume:
        # working directory path   =====================>
        - /c/working/directory/path:/workDir 
        # genome directory path   =====================>
        - /c/genome/directory/path:/genome 
        # scratch directory path(Data)   =====================>
        - /c/scratch/directory/path(Data):/scratch 