version: v1.0
workflows:
  topx-workflow:
    type: cwl
    config:
      file: topx.cwl
      settings: topx-params.yml
    bindings:
      - step: /
        target:
          deployment: docker-topx
deployments:
  docker-topx:
    type: docker
    config:
      image: repbioinfo/topxv2:1
      volume:
        # Path to the working directory   =====================>
        - /c/Path/to/the/working/directory:/workdir 
        # Path to the folder containing input data and receiving output results   =====================>
        - /c/Path/to/the/folder/containing/input/data/and/receiving/output/results:/data 