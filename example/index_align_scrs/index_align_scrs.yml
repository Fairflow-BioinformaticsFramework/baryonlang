version: v1.0
workflows:
  index_align_scrs-workflow:
    type: cwl
    config:
      file: index_align_scrs.cwl
      settings: index_align_scrs-params.yml
    bindings:
      - step: /
        target:
          deployment: docker-index_align_scrs
deployments:
  docker-index_align_scrs:
    type: docker
    config:
      image: repbioinfo/carncellranger2
      volume:
        # percorso cartella di lavoro   =====================>
        - /c/percorso/cartella/di/lavoro:/workDir 
        # working directory path, Genome   =====================>
        - /c/working/directory/path,/Genome:/genome 
        # Data directory path   =====================>
        - /c/Data/directory/path:/scratch 